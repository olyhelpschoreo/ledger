<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3d7fe0"/>
      <stop offset="1" stop-color="#2154a8"/>
    </linearGradient>
    <linearGradient id="pg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#eef3fb"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="114" fill="url(#bg)"/>
  <!-- ledger page -->
  <rect x="132" y="120" width="248" height="272" rx="20" fill="url(#pg)"/>
  <!-- binding rings -->
  <circle cx="176" cy="120" r="14" fill="none" stroke="#c9d6ec" stroke-width="10"/>
  <circle cx="256" cy="120" r="14" fill="none" stroke="#c9d6ec" stroke-width="10"/>
  <circle cx="336" cy="120" r="14" fill="none" stroke="#c9d6ec" stroke-width="10"/>
  <!-- ruled lines -->
  <g stroke="#cdd9ef" stroke-width="9" stroke-linecap="round">
    <line x1="168" y1="188" x2="344" y2="188"/>
    <line x1="168" y1="228" x2="344" y2="228"/>
    <line x1="168" y1="268" x2="300" y2="268"/>
  </g>
  <!-- ascending data ticks = "days rising" -->
  <g stroke="#2a6fd6" stroke-width="18" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <polyline points="176,340 224,318 272,330 320,290 348,300"/>
  </g>
  <circle cx="320" cy="290" r="13" fill="#2a6fd6"/>
</svg>
